# ─────────────────────────────────────────────────────────────────────────────
# Lucky 13 Pub Crawl — Provision Infrastructure (manual only)
# Run this when Azure resources need to be created or updated.
# Trigger: GitHub Actions → provision.yml → Run workflow
# ─────────────────────────────────────────────────────────────────────────────

name: Provision Infrastructure

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  BICEP_PATH:   'PubCrawl/IaC/biceps/main.bicep'
  BICEP_PARAMS: 'PubCrawl/IaC/biceps/main.parameters.prod.json'

jobs:
  provision:
    name: Deploy Bicep
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          scope:             resourcegroup
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          template:          ${{ env.BICEP_PATH }}
          parameters:        ${{ env.BICEP_PARAMS }}
          deploymentName:    lucky13-infra-${{ github.run_number }}-${{ github.run_attempt }}
          failOnStdErr:      false
