# ─────────────────────────────────────────────────────────────────────────────
# Lucky 13 Pub Crawl — CI/CD
#
# Push to main  → provision infra (Bicep) + build + deploy to production
# Pull request  → build + deploy to preview environment
# PR closed     → tear down preview environment
#
# Required GitHub Secrets:
#   AZURE_CLIENT_ID           Service principal app (client) ID
#   AZURE_TENANT_ID           Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID     Azure subscription ID
#   AZURE_RESOURCE_GROUP      Target resource group name
#   AZURE_STATIC_WEB_APPS_API_TOKEN  SWA deployment token (from first Bicep run)
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy Lucky 13 Pub Crawl

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH:   'PubCrawl/Client/PubCrawl.csproj'
  PUBLISH_PATH:   'PubCrawl/Client/bin/Release/net10.0/publish/wwwroot'
  BICEP_PATH:     'PubCrawl/IaC/biceps/main.bicep'
  BICEP_PARAMS:   'PubCrawl/IaC/biceps/main.parameters.prod.json'

jobs:

# ── 1. PROVISION ─────────────────────────────────────────────────────────────
  provision:
    name: Provision Infrastructure (Bicep)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          scope:             resourcegroup
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          template:          ${{ env.BICEP_PATH }}
          parameters:        ${{ env.BICEP_PARAMS }}
          deploymentName:    lucky13-pubcrawl-${{ github.run_number }}
          failOnStdErr:      false

# ── 2. BUILD ──────────────────────────────────────────────────────────────────
  build:
    name: Build Blazor WASM
    runs-on: ubuntu-latest
    needs: [provision]
    if: |
      always() &&
      github.event.action != 'closed' &&
      (needs.provision.result == 'success' || needs.provision.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality:  preview

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-restore --output PubCrawl/Client/bin/Release/net10.0/publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blazor-wasm
          path: ${{ env.PUBLISH_PATH }}
          if-no-files-found: error

# ── 3. DEPLOY ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure Static Web App
    runs-on: ubuntu-latest
    needs: build
    if: github.event.action != 'closed'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: blazor-wasm
          path: ./wwwroot

      - name: Deploy to Azure SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token:      ${{ secrets.GITHUB_TOKEN }}
          action:          upload
          app_location:    ./wwwroot
          output_location: ''
          skip_app_build:  true

# ── 4. CLOSE PR PREVIEW ───────────────────────────────────────────────────────
  close_preview:
    name: Close PR Preview Environment
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'

    steps:
      - name: Teardown preview
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action:       close
          app_location: ''
