# ─────────────────────────────────────────────────────────────────────────────
# Lucky 13 Pub Crawl — Build & Deploy
# Runs on every push to main and on pull requests.
# Infrastructure changes: use provision.yml (manual trigger only)
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy Lucky 13 Pub Crawl

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

permissions:
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH:   'PubCrawl/Client/PubCrawl.csproj'
  PUBLISH_PATH:   'PubCrawl/Client/bin/Release/net10.0/publish/wwwroot'

jobs:

# ── 1. BUILD ──────────────────────────────────────────────────────────────────
  build:
    name: Build Blazor WASM
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality:  preview

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-restore --output PubCrawl/Client/bin/Release/net10.0/publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blazor-wasm
          path: ${{ env.PUBLISH_PATH }}
          if-no-files-found: error

# ── 2. DEPLOY ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure Static Web App
    runs-on: ubuntu-latest
    needs: build
    if: github.event.action != 'closed'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: blazor-wasm
          path: ./wwwroot

      - name: Deploy to Azure SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token:      ${{ secrets.GITHUB_TOKEN }}
          action:          upload
          app_location:    ./wwwroot
          output_location: ''
          skip_app_build:  true

# ── 3. CLOSE PR PREVIEW ───────────────────────────────────────────────────────
  close_preview:
    name: Close PR Preview Environment
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'

    steps:
      - name: Teardown preview
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action:       close
          app_location: ''
